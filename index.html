<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Exam Collector</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;font-family:'Cairo',sans-serif;color:#e2e8f0;min-height:100vh}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:#0f172a}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  @keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .header{background:#0f172aee;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
  .header-inner{max-width:860px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .header-title{font-size:18px;font-weight:900;color:#e2e8f0}
  .header-sub{font-size:12px;color:#64748b;margin-top:2px}
  .stats-row{display:flex;gap:10px}
  .stat-box{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:7px 14px;text-align:center}
  .stat-num{display:block;color:#6366f1;font-weight:900;font-size:18px}
  .stat-label{color:#64748b;font-size:11px}
  .nav-row{max-width:860px;margin:0 auto;padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap}
  .nav-btn{background:transparent;border:1px solid #1e293b;color:#64748b;border-radius:8px;padding:7px 13px;cursor:pointer;font-family:'Cairo';font-size:13px;transition:all .2s}
  .nav-btn.active,.nav-btn:hover{background:#1e293b;color:#e2e8f0;border-color:#334155}

  .content{max-width:860px;margin:0 auto;padding:20px 16px}
  .page{animation:slideIn .35s ease}

  .card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:14px}
  .card-title{font-size:17px;font-weight:900;color:#e2e8f0;margin-bottom:6px}
  .card-sub{font-size:13px;color:#64748b;margin-bottom:18px}

  .progress-bar{height:8px;background:#0f172a;border-radius:4px;overflow:hidden;margin:10px 0 6px}
  .progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#6ee7b7);border-radius:4px;transition:width .6s ease}

  .group-card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:18px;margin-bottom:12px}
  .group-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .group-dot{width:10px;height:10px;border-radius:50%}
  .group-title{font-weight:700;font-size:15px}
  .group-count{color:#64748b;font-size:12px}
  .member-grid{display:flex;flex-wrap:wrap;gap:7px}
  .member-chip{display:flex;align-items:center;gap:5px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:5px 10px;transition:all .3s}
  .member-chip.confirmed{border-color:#6ee7b7}
  .member-name{font-size:13px;color:#94a3b8;transition:color .3s}
  .member-chip.confirmed .member-name{color:#e2e8f0}
  .member-icon{font-size:11px;color:#64748b}
  .member-chip.confirmed .member-icon{color:#6ee7b7}

  label.lbl{display:block;color:#94a3b8;font-size:13px;margin-bottom:6px;margin-top:14px}
  input,textarea,select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:9px;padding:10px 13px;color:#e2e8f0;font-family:'Cairo';font-size:14px;outline:none;transition:border-color .2s}
  input:focus,textarea:focus,select:focus{border-color:#6366f1}
  textarea{resize:vertical}
  select option{background:#1e293b}

  .btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-family:'Cairo';font-weight:700;font-size:15px;margin-top:16px;transition:all .2s}
  .btn-primary{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff}
  .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
  .btn-green{background:linear-gradient(135deg,#059669,#6ee7b7);color:#fff}
  .btn-green:hover{opacity:.9;transform:translateY(-1px)}
  .btn-disabled{background:#1e293b;color:#475569;cursor:not-allowed}
  .btn-ghost{background:#1e293b;color:#94a3b8;border:1px solid #334155}

  .alert-success{background:#064e3b22;color:#6ee7b7;border:1px solid #065f4644;border-radius:9px;padding:10px 13px;font-size:13px;margin-top:10px;text-align:center;animation:fadeIn .3s ease}
  .alert-info{background:#1e3a5f22;color:#93c5fd;border:1px solid #1e40af33;border-radius:9px;padding:10px 13px;font-size:13px;margin-top:10px}

  .q-card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:18px;margin-bottom:12px;transition:transform .2s,border-color .2s}
  .q-card:hover{transform:translateY(-2px);border-color:#475569}
  .q-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:6px}
  .q-badges{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .badge{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700}
  .q-author{color:#e2e8f0;font-weight:700;font-size:13px}
  .q-time{color:#475569;font-size:11px}
  .q-actions{display:flex;gap:6px}
  .icon-btn{background:#1e40af22;color:#93c5fd;border:1px solid #1e40af33;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:13px;transition:all .2s}
  .icon-btn:hover{background:#1e40af44}
  .icon-btn.del{background:#7f1d1d22;color:#f87171;border-color:#7f1d1d33}
  .icon-btn.del:hover{background:#7f1d1d44}
  .q-text{color:#e2e8f0;font-weight:700;font-size:15px;margin-bottom:14px;line-height:1.7}
  .options-grid{display:flex;flex-direction:column;gap:7px}
  .option-item{display:flex;align-items:center;gap:8px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px}
  .option-item.correct{background:#064e3b22;border-color:#065f4644}
  .opt-letter{font-weight:700;color:#6366f1;min-width:20px}
  .option-item.correct .opt-letter{color:#6ee7b7}
  .opt-text{color:#cbd5e1}
  .option-item.correct .opt-text{color:#6ee7b7}
  .correct-icon{margin-right:auto;font-size:13px}

  .filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .search-box{flex:1;min-width:180px}
  .filter-btn{background:#1e293b;border:1px solid #334155;color:#64748b;border-radius:8px;padding:7px 12px;cursor:pointer;font-family:'Cairo';font-size:12px;transition:all .2s;white-space:nowrap}
  .filter-btn.active,.filter-btn:hover{background:#6366f122;color:#818cf8;border-color:#6366f1}

  .empty{text-align:center;padding:50px 20px}
  .empty-icon{font-size:40px;margin-bottom:10px}
  .empty-text{color:#64748b;font-size:14px}

  .live-dot{display:inline-block;width:7px;height:7px;background:#6ee7b7;border-radius:50%;margin-left:5px;animation:pulse 2s infinite}
  .live-label{color:#64748b;font-size:12px;margin-bottom:14px}

  .loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid #1e293b;border-top:3px solid #6366f1;border-radius:50%;animation:spin 1s linear infinite}

  @media(max-width:480px){
    .header-inner{padding:10px 12px}
    .header-title{font-size:15px}
    .stats-row{gap:6px}
    .stat-box{padding:5px 10px}
    .stat-num{font-size:15px}
    .content{padding:14px 10px}
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p style="color:#64748b;font-family:Cairo">جاري الاتصال...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEYrkPkmiFg2T7mbW4rSnquS1wMLQBZoM",
  authDomain: "exam-collector.firebaseapp.com",
  projectId: "exam-collector",
  storageBucket: "exam-collector.firebasestorage.app",
  messagingSenderId: "975572012422",
  appId: "1:975572012422:web:1b2809b3a3df01d471b007"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const MEMBERS = {
  "امسكيو": ["المرزوقي","سارة ملخصات","اميمة","رواء","حواء خالد","نور عيسى","ساRة","الياس الحجاج","توجي","سارة","ساسي","مسرة","حواء حسين","تقوى قلب احمر","لجين","ضياء","عائشة","نور","صفاء","فاطمة","تقوى قلب بودري","طه","فيوكة","الاء عثمان","مرام","سندس","عهد","اYa ko","رغد","بلقيس"],
  "Give Reason": ["اسيا","مكية","مؤمن","الاء خالد","سجى","الياس الحاجي","ساجدة","ليبيا","يحيى","اية"],
  "Written Question": ["اية مرة ثانية","اسراء","مسرة البدوي","إسماعيل","سهى"]
};
const ALL_MEMBERS = Object.values(MEMBERS).flat();
const CAT_COLORS = {"امسكيو":"#6ee7b7","Give Reason":"#93c5fd","Written Question":"#f9a8d4"};

let state = {
  page: "home",
  selectedUser: "",
  filter: "الكل",
  search: "",
  editingId: null,
  msg: "",
  conf: {},
  qs: [],
  form: {question:"",a:"",b:"",c:"",d:"",answer:""}
};

// Real-time listeners
const confRef = doc(db, "data", "confirmations");
const qsRef = collection(db, "questions");

onSnapshot(confRef, (snap) => {
  state.conf = snap.exists() ? snap.data() : {};
  render();
});

onSnapshot(query(qsRef, orderBy("createdAt", "asc")), (snap) => {
  state.qs = snap.docs.map(d => ({id: d.id, ...d.data()}));
  render();
});

function getMemberCat(name){
  for(const [cat,members] of Object.entries(MEMBERS)){
    if(members.includes(name)) return cat;
  }
  return "غير محدد";
}

function confirmedCount(){ return Object.values(state.conf).filter(Boolean).length; }

function render(){
  // Don't re-render while user is typing — prevents keyboard closing on mobile
  const active = document.activeElement;
  if(active && (active.tagName==="INPUT"||active.tagName==="TEXTAREA")){
    const cc = confirmedCount();
    const nums = document.querySelectorAll(".stat-num");
    if(nums[0]) nums[0].textContent = cc;
    if(nums[1]) nums[1].textContent = state.qs.length;
    return;
  }
  const cc = confirmedCount();
  document.getElementById("app").innerHTML = `
  <div class="header">
    <div class="header-inner">
      <div>
        <div class="header-title">📚 Exam Collector</div>
        <div class="header-sub">مجموعة الـ 45 — تجميع امتحانات</div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><span class="stat-num">${cc}</span><span class="stat-label">مؤكد</span></div>
        <div class="stat-box"><span class="stat-num">${state.qs.length}</span><span class="stat-label">سؤال</span></div>
        <div class="stat-box"><span class="stat-num">45</span><span class="stat-label">عضو</span></div>
      </div>
    </div>
    <div class="nav-row">
      ${[["home","🏠 الرئيسية"],["confirm","✅ تأكيد"],["submit","➕ سؤال"],["dashboard","📊 الأسئلة"]].map(([p,l])=>
        `<button class="nav-btn ${state.page===p?'active':''}" onclick="goPage('${p}')">${l}</button>`
      ).join("")}
    </div>
  </div>
  <div class="content">
    <div class="page">${renderPage()}</div>
  </div>`;
}

function renderPage(){
  if(state.page==="home") return renderHome();
  if(state.page==="confirm") return renderConfirm();
  if(state.page==="submit") return renderSubmit();
  if(state.page==="dashboard") return renderDashboard();
  return "";
}

function renderHome(){
  const cc = confirmedCount();
  const pct = Math.round(cc/45*100);
  let html = `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title">نسبة تأكيد الحضور</div>
      <span style="color:#6ee7b7;font-weight:900;font-size:20px">${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="color:#64748b;font-size:13px">${cc} من 45 شخص أكدوا حضورهم</div>
  </div>`;
  for(const [cat,members] of Object.entries(MEMBERS)){
    const confirmed = members.filter(n=>state.conf[n]);
    html += `
    <div class="group-card">
      <div class="group-header">
        <div class="group-dot" style="background:${CAT_COLORS[cat]}"></div>
        <span class="group-title">${cat}</span>
        <span class="group-count">(${confirmed.length}/${members.length} أكدوا)</span>
      </div>
      <div class="member-grid">
        ${members.map(name=>`
          <div class="member-chip ${state.conf[name]?'confirmed':''}">
            <span class="member-icon">${state.conf[name]?'✅':'⭕'}</span>
            <span class="member-name">${name}</span>
          </div>`).join("")}
      </div>
    </div>`;
  }
  return html;
}

function renderConfirm(){
  const userConfirmed = state.selectedUser && state.conf[state.selectedUser];
  let opts = `<option value="">— اختر اسمك —</option>`;
  for(const [cat,members] of Object.entries(MEMBERS)){
    opts += `<optgroup label="${cat}">`;
    members.forEach(n=>{ opts+=`<option value="${n}" ${state.selectedUser===n?'selected':''}>${n} ${state.conf[n]?'✅':''}</option>`; });
    opts += `</optgroup>`;
  }
  return `
  <div class="card" style="max-width:480px;margin:0 auto">
    <div class="card-title">✅ تأكيد الحضور</div>
    <div class="card-sub">اختر اسمك وأكد — يظهر للكل فوراً 🔥</div>
    <label class="lbl">اختر اسمك</label>
    <select onchange="setUser(this.value)">${opts}</select>
    ${userConfirmed?`<div class="alert-info">✅ أكدت حضورك مسبقاً يا ${state.selectedUser}</div>`:''}
    ${state.msg?`<div class="alert-success">${state.msg}</div>`:''}
    <button class="btn ${(!state.selectedUser||userConfirmed)?'btn-disabled':'btn-primary'}"
      onclick="handleConfirm()" ${(!state.selectedUser||userConfirmed)?'disabled':''}>
      ${userConfirmed?'تم التأكيد ✅':'أكد حضوري 🎯'}
    </button>
    ${userConfirmed?`<button class="btn btn-ghost" style="margin-top:8px;color:#f87171;border-color:#7f1d1d33" onclick="handleUnconfirm()">❌ إلغاء التأكيد</button>`:''}
  </div>`;
}

function renderSubmit(){
  const f = state.form;
  const cat = getMemberCat(state.selectedUser);
  const isMCQ = cat === "امسكيو" || !state.selectedUser;
  let opts = `<option value="">— اختر اسمك —</option>`;
  ALL_MEMBERS.forEach(n=>{ opts+=`<option value="${n}" ${state.selectedUser===n?'selected':''}>${n}</option>`; });
  const disabled = !state.selectedUser || !f.question.trim();
  return `
  <div class="card" style="max-width:560px;margin:0 auto">
    <div class="card-title">${state.editingId?'✏️ تعديل السؤال':'➕ إضافة سؤال جديد'}</div>
    <label class="lbl">اسمك</label>
    <select onchange="setUser(this.value)">${opts}</select>
    <label class="lbl">نص السؤال</label>
    <textarea rows="3" placeholder="اكتب السؤال هنا..." oninput="updateForm('question',this.value)">${f.question}</textarea>
    ${isMCQ ? `
      ${['a','b','c','d'].map(o=>`
        <label class="lbl">الخيار ${o.toUpperCase()}</label>
        <input type="text" value="${f[o]||''}" placeholder="الخيار ${o.toUpperCase()}" oninput="updateForm('${o}',this.value)">
      `).join("")}
      <label class="lbl">الإجابة الصحيحة</label>
      <select onchange="updateForm('answer',this.value)">
        <option value="">— اختر —</option>
        ${['A','B','C','D'].map(x=>`<option value="${x}" ${f.answer===x?'selected':''}>${x}</option>`).join("")}
      </select>
    ` : `
      <label class="lbl">الإجابة</label>
      <textarea rows="3" placeholder="اكتب الإجابة هنا..." oninput="updateForm('answer',this.value)">${f.answer||''}</textarea>
    `}
    ${state.msg?`<div class="alert-success">${state.msg}</div>`:''}
    <button class="btn ${disabled?'btn-disabled':'btn-green'}" onclick="handleSubmit()" ${disabled?'disabled':''}>
      ${state.editingId?'💾 حفظ التعديل':'🚀 أضف السؤال'}
    </button>
    ${state.editingId?`<button class="btn btn-ghost" style="margin-top:8px" onclick="cancelEdit()">إلغاء التعديل</button>`:''}
  </div>`;
}

function renderDashboard(){
  const filtered = state.qs.filter(q=>{
    const catOk = state.filter==="الكل" || getMemberCat(q.author)===state.filter;
    const searchOk = !state.search || q.question.includes(state.search) || q.author.includes(state.search);
    return catOk && searchOk;
  });
  return `
  <div class="filter-row">
    <input class="search-box" type="text" placeholder="🔍 ابحث..." value="${state.search}" oninput="setSearch(this.value)">
    ${["الكل",...Object.keys(MEMBERS)].map(cat=>`
      <button class="filter-btn ${state.filter===cat?'active':''}" onclick="setFilter('${cat}')">${cat}</button>
    `).join("")}
  </div>
  <div class="live-label"><span class="live-dot"></span> ${filtered.length} سؤال — مباشر من Firebase 🔥</div>
  ${filtered.length===0?`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">لا توجد أسئلة بعد</div></div>`:''}
  ${filtered.map(q=>{
    const cat = getMemberCat(q.author);
    const color = CAT_COLORS[cat]||"#94a3b8";
    return `
    <div class="q-card">
      <div class="q-meta">
        <div class="q-badges">
          <span class="badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${cat}</span>
          <span class="q-author">${q.author}</span>
          <span class="q-time">${q.timestamp||''}</span>
        </div>
        <div class="q-actions">
          <button class="icon-btn" onclick="editQ('${q.id}')">✏️</button>
          <button class="icon-btn del" onclick="deleteQ('${q.id}')">🗑️</button>
        </div>
      </div>
      <div class="q-text">${q.question}</div>
      ${(getMemberCat(q.author)==="امسكيو") ? `
      <div class="options-grid">
        ${['a','b','c','d'].filter(o=>q[o]).map(o=>`
          <div class="option-item ${q.answer===o.toUpperCase()?'correct':''}">
            <span class="opt-letter">${o.toUpperCase()}.</span>
            <span class="opt-text">${q[o]}</span>
            ${q.answer===o.toUpperCase()?'<span class="correct-icon">✅</span>':''}
          </div>`).join("")}
      </div>` : `
      ${q.answer ? `<div class="option-item correct" style="margin-top:6px">
        <span class="opt-letter">✅</span>
        <span class="opt-text" style="color:#6ee7b7;white-space:pre-wrap">${q.answer}</span>
      </div>` : ''}`}
    </div>`;
  }).join("")}`;
}

// Partial render: only updates the inner content area (keeps keyboard open)
function renderDashboardOnly(){
  const el = document.querySelector(".page");
  if(el) el.innerHTML = renderPage();
}

// Actions (global)
window.goPage = (p)=>{ state.page=p; state.msg=""; state.editingId=null; state.form={question:"",a:"",b:"",c:"",d:"",answer:""}; render(); };
window.setUser = (v)=>{ state.selectedUser=v; render(); };
window.setFilter = (f)=>{ state.filter=f; render(); };
window.setSearch = (v)=>{ state.search=v; renderDashboardOnly(); };
// updateForm only saves to state — no render() so keyboard stays open
window.updateForm = (k,v)=>{ state.form[k]=v; };
window.cancelEdit = ()=>{ state.editingId=null; state.form={question:"",a:"",b:"",c:"",d:"",answer:""}; render(); };

window.handleConfirm = async ()=>{
  if(!state.selectedUser||state.conf[state.selectedUser]) return;
  await setDoc(confRef, {[state.selectedUser]: true}, {merge: true});
  state.msg = `✅ تم تأكيد حضور ${state.selectedUser}!`;
  render();
  setTimeout(()=>{ state.msg=""; render(); }, 3000);
};

window.handleUnconfirm = async ()=>{
  if(!state.selectedUser||!state.conf[state.selectedUser]) return;
  if(!confirm(`إلغاء تأكيد حضور ${state.selectedUser}؟`)) return;
  await setDoc(confRef, {[state.selectedUser]: false}, {merge: true});
  state.msg = `❌ تم إلغاء تأكيد ${state.selectedUser}`;
  render();
  setTimeout(()=>{ state.msg=""; render(); }, 3000);
};

window.handleSubmit = async ()=>{
  const f = state.form;
  if(!state.selectedUser||!f.question.trim()) return;
  const data = {
    author: state.selectedUser,
    question: f.question,
    a: f.a||"", b: f.b||"", c: f.c||"", d: f.d||"",
    answer: f.answer,
    timestamp: new Date().toLocaleString("ar-EG"),
    createdAt: serverTimestamp()
  };
  if(state.editingId){
    await updateDoc(doc(db,"questions",state.editingId), data);
    state.msg = "✅ تم تعديل السؤال!";
    state.editingId = null;
  } else {
    await addDoc(qsRef, data);
    state.msg = "✅ تم إضافة السؤال!";
  }
  state.form = {question:"",a:"",b:"",c:"",d:"",answer:""};
  render();
  setTimeout(()=>{ state.msg=""; render(); }, 3000);
};

window.editQ = (id)=>{
  const q = state.qs.find(x=>x.id===id);
  if(!q) return;
  state.editingId = id;
  state.form = {question:q.question,a:q.a||"",b:q.b||"",c:q.c||"",d:q.d||"",answer:q.answer||""};
  state.page = "submit";
  render();
};

window.deleteQ = async (id)=>{
  if(!confirm("حذف السؤال؟")) return;
  await deleteDoc(doc(db,"questions",id));
};

</script>
</body>
</html>
